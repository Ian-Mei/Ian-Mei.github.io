		tailwind.config = {
			theme: {
				extend: {
					fontFamily: { sans: ['Inter', 'sans-serif'] },
					colors: {
						brand: { red: '#f64f59', orange: '#e1940f', yellow: '#e4e12a' }
					},
					animation: {
						'fade-up': 'fadeUp 0.7s ease-out forwards',
						'fade-in': 'fadeIn 0.5s ease-out forwards',
						'blink': 'blink 1s step-end infinite',
					},
					keyframes: {
						fadeUp:  { '0%': { opacity: 0, transform: 'translateY(24px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
						fadeIn:  { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
						blink:   { '0%,100%': { opacity: 1 }, '50%': { opacity: 0 } },
					}
				}
			}
		}
	</script>
	<style>
		body { background-color: #030303; font-family: 'Inter', sans-serif; }
		.text-gradient {
			background: linear-gradient(90deg, #f64f59, #e1940f, #e4e12a);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		.glass {
			background: rgba(255,255,255,0.05);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid rgba(255,255,255,0.08);
		}
		.glass-hover:hover {
			background: rgba(255,255,255,0.09);
			border-color: rgba(255,255,255,0.15);
		}
		#particle-canvas {
			position: fixed; inset: 0;
			pointer-events: none; z-index: 0;
		}
		.nav-link {
			position: relative; overflow: hidden;
			color: rgba(255,255,255,0.5);
			font-size: 0.875rem; letter-spacing: 0.05em;
			padding: 0.3em 0; text-decoration: none;
			transition: color 0.25s;
		}
		.nav-link::after {
			content: '';
			position: absolute; bottom: 0; left: 0;
			width: 100%; height: 2px;
			background: linear-gradient(90deg, #f64f59, #e1940f);
			transform: scaleX(0); transform-origin: left;
			transition: transform 0.3s ease;
		}
		.nav-link:hover, .nav-link.active { color: #fff; }
		.nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }
		.profile-ring {
			background: linear-gradient(135deg, #f64f59, #e1940f, #e4e12a);
			padding: 3px; border-radius: 50%;
		}
		[x-cloak] { display: none !important; }
	</style>

			<img id="ian" src="images/Ian.jpg" alt="Ian Mei"
				class="rounded-full w-48 h-48 object-cover block cursor-pointer

		</div>

		<!-- Greeting -->
		<div class="text-center space-y-3 animate-fade-up" style="animation-delay:0.25s;opacity:0;">
			<p class="text-gradient text-4xl sm:text-5xl md:text-6xl font-bold leading-tight">
				Hi, my name is Ian Mei.
			</p>
			<p class="text-gradient text-3xl sm:text-4xl md:text-5xl font-bold leading-tight flex items-center justify-center gap-2">

					class="animate-blink text-white/70">|</span>
			</p>
		</div>

		<!-- CTA buttons -->
		<div class="flex flex-wrap gap-4 mt-10 justify-center animate-fade-up" style="animation-delay:0.45s;opacity:0;">
			<a href="projects.html"

				View Projects

			<a href="about.html"
				class="px-7 py-3 rounded-full font-medium text-sm glass glass-hover
						text-white transition-all">
				About Me
			</a>
		</div>

		<p class="mt-16 text-white/20 text-xs tracking-widest animate-fade-in" style="animation-delay:1.2s;opacity:0;">
			SCROLL TO EXPLORE
		</p>
	</main>
